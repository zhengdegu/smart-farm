openapi: 3.0.3
info:
  title: 智慧农业平台 API
  version: 1.0.0
  description: 物联网智慧农业灌溉管理平台 RESTful API

servers:
  - url: http://localhost:8080/api/v1
    description: 开发环境

tags:
  - name: auth
    description: 认证鉴权
  - name: device
    description: 设备管理
  - name: telemetry
    description: 传感器数据
  - name: command
    description: 灌溉控制指令
  - name: rule
    description: 灌溉规则
  - name: alert
    description: 告警管理

paths:
  # ===== 认证 =====
  /auth/login:
    post:
      tags: [auth]
      summary: 微信小程序登录
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: 微信登录code
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  expires_in:
                    type: integer
                  user:
                    $ref: '#/components/schemas/User'

  /auth/device:
    post:
      tags: [auth]
      summary: 设备认证（获取MQTT Token）
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [device_id, device_secret]
              properties:
                device_id:
                  type: string
                device_secret:
                  type: string
      responses:
        '200':
          description: 认证成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  mqtt_host:
                    type: string
                  mqtt_port:
                    type: integer
                  expires_in:
                    type: integer

  # ===== 设备管理 =====
  /devices:
    get:
      tags: [device]
      summary: 获取设备列表
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [SENSOR, VALVE, GATEWAY]
        - name: status
          in: query
          schema:
            type: string
            enum: [ONLINE, OFFLINE, FAULT]
      responses:
        '200':
          description: 设备列表
          content:
            applation/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Device'

    post:
      tags: [device]
      summary: 注册新设备
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeviceCreate'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'

  /devices/{device_id}:
    get:
      tags: [device]
      summary: 获取设备详情
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 设备详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Device'

    delete:
      tags: [device]
      summary: 删除设备
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: 删除成功

  # ===== 传感器数据 =====
  /telemetry/{device_id}/latest:
    get:
      tags: [telemetry]
      summary: 获取传感器最新数据
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 最新数据
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SensorData'

  /telemetry/{device_id}/history:
    get:
      tags: [telemetry]
      summary: 获取传感器历史数据
      parameters:
        - name: device_id
          in: path
          required: true
          schema:
            type: string
        - name: start
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          required: true
          schema:
            type: string
            format: date-time
        - name: interval
          in: query
          schema:
            type: string
            enum: [1m, 5m, 15m, 1h, 1d]
            default: 5m
      responses:
        '200':
          description: 历史数据
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SensorData'

  /telemetry/dashboard:
    get:
      tags: [telemetry]
      summary: 仪表盘概览数据
      responses:
        '200':
          description: 概览数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  device_total:
                    type: integer
                  device_online:
                    type: integer
                  alerts_today:
                    type: integer
                  irrigation_today:
                    type: integer
                  sensors:
                    type: array
                    items:
                      $ref: '#/components/schemas/SensorData'

  # ===== 灌溉控制 =====
  /commands:
    post:
      tags: [command]
      summary: 下发控制指令
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandCreate'
      responses:
        '201':
          description: 指令已创建
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'

  /commands/{cmd_id}:
    get:
      tags: [command]
      summary: 查询指令状态
      parameters:
        - name: cmd_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 指令详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Command'

  /commands/emergency-stop:
    post:
      tags: [command]
      summary: 紧急停止所有灌溉
      responses:
        '200':
          description: 已发送紧急停止指令
          content:
            application/json:
              schema:
                type: object
                properties:
                  stopped_count:
                    type: integer
                  commands:
                    e: array
                    items:
                      $ref: '#/components/schemas/Command'

  /commands/history:
    get:
      tags: [command]
      summary: 灌溉记录列表
      parameters:
        - name: device_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [CREATED, SENT, CONFIRMED, EXECUTED, FAILED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: size
          in: query
          schema:
         type: integer
            default: 20
      responses:
        '200':
          description: 灌溉记录
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedCommands'

  # ===== 灌溉规则 =====
  /rules:
    get:
      tags: [rule]
      summary: 获取灌溉规则列表
      responses:
        '200':
          description: 规则列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IrrigationRule'

    post:
      tags: [rule]
      summary: 创建灌溉规则
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreate'
      responses:
        '201':
          description: 创建成功

  /rules/{rule_id}:
    put:
      tags: [rule]
      summary: 更新灌溉规则
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RuleCreate'
      responses:
        '200':
          description: 更新成功

    delete:
      tags: [rule]
      summary: 删除灌溉规则
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: 删除成功

  /rules/{rule_id}/toggle:
    post:
      tags: [rule]
      summary: 启用/禁用规则
      parameters:
        - name: rule_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 切换成功

  # ===== 告警 =====
  /alerts:
    get:
      tags: [alert]
      summary: 获取告警列表
      parameters:
        - name: level
          in: query
          schema:
            type: string
            enum: [L1, L2, L3]
        - name: status
          in: query
          schema:
            type: string
            enum: [PENDING, ACKNOWLEDGED, RESOLVED]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: 告警列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedAlerts'

  /alerts/{alert_id}/acknowledge:
    post:
      tags: [alert]
      summary: 确认告警
      parameters:
        - name: alert_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 已确认

  /alerts/stats:
    get:
      tags: [alert]
      summary: 告警统计
      responses:
        '200':
          description: 统计数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  pending_l1:
                    type: integer
                  pending_l2:
                    type: integer
                  pending_l3:
                    type: integer
                  today_total:
                    type: integer

# ===== 数据模型 =====
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: strin      nickname:
          type: string
        role:
          type: string
          enum: [ADMIN, OPERATOR, VIEWER]

    Device:
      type: object
      properties:
        id:
          type: integer
        device_id:
          type: string
        device_type:
          type: string
          enum: [SENSOR, VALVE, GATEWAY]
        name:
          type: string
        location:
          type: string
        greenhouse_no:
          type: string
        status:
          type: string
          enum: [ONLINE, OFFLINE, FAULT]
        last_online_at:
          type: string
          format: date-time
        metadata:
          type: object

    DeviceCreate:
      type: object
      required: [device_id, device_type, name]
      properties:
        device_id:
          type: string
        device_type:
          type: string
          enum: [SENSOR, VALVE, GATEWAY]
        name:
          type: string
        location:
          type: string
        greenhouse_no:
          type: string

    SensorData:
      type: object
      properties:
        device_id:
          type: string
        data_type:
          type: string
          enum: [soil_moisture, soil_temp, air_temp, air_humidity]
        value:
          type: number
        unit:
          type: string
        timestamp:
          type: string
          format: date-time

    Command:
      type: object
      properties:
        cmd_id:
          type: string
        device_id:
          type: string
        action:
          type: string
          enum: [OPEN_VALVE, CLOSE_VALVE]
        params:
          type: object
          properties:
            duration_min:
              type: integer
        status:
          type: string
          enum: [CREATED, SENT, CONFIRMED, EXECUTED, FAILED]
        retry_count:
          type: integer
        triggered_by:
          type: string
        created_at:
          type: string
          format: date-time
        executed_at:
          type: string
          format: date-time
        error_message:
          type: string

    CommandCreate:
      type: object
      required: [device_id, action]
      properties:
        device_id:
          type: string
        action:
          type: string
          enum: [OPEN_VALVE, CLOSE_VALVE]
        params:
          type: object
          properties:
            duration_min:
              type: integer
              default: 30

    IrrigationRule:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        rule_type:
          type: string
          enum: [THRESHOLD, SCHEDULE]
        device_id:
          type: string
        sensor_device_id:
          type: string
        threshold_low:
          type: number
        threshold_high:
          type: number
        cron_expression:
          type: string
        duration_min:
          type: integer
        enabled:
          type: boolean

    RuleCreate:
      type: object
      required: [name, rule_type, device_id]
      properties:
        name:
          type: string
        rule_type:
          type: string
          enum: [THRESHOLD, SCHEDULE]
        device_id:
          type: string
        sensor_device_id:
          type: string
        threshold_low:
          type: number
        threshold_high:
          type: number
        cron_expression:
          type: string
        duration_min:
          type: integer
          default: 30

    PagedCommands:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Command'

    PagedAlerts:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        size:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/Alert'

    Alert:
      type: object
      properties:
        id:
          type: integer
        device_id:
          type: string
        level:
          type: string
          enum: [L1, L2, L3]
        type:
          type: string
        title:
          type: string
        content:
          type: string
        status:
          type: string
          enum: [PENDING, ACKNOWLEDGED, RESOLVED]
        created_at:
          type: string
          format: date-time

security:
  - BearerAuth: []
