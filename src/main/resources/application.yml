server:
  port: 8080

spring:
  application:
    name: smart-farm

  datasource:
    url: jdbc:postgresql://localhost:5432/smartfarm_dev
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MQTT
mqtt:
  broker: tcp://localhost:1883
  client-id: smartfarm-server
  username: ""
  password: ""
  default-qos: 1

# JWT
jwt:
  secret: dev-secret-key-change-in-production-at-least-256-bits-long!!
  access-token-expiry: 7200      # 2小时
  refresh-token-expiry: 604800   # 7天

# 业务配置
smartfarm:
  tenant-id: t001
  command:
    timeout-seconds: 30
    max-retry: 3
    max-duration-minutes: 60

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
