server:
  port: 8080

spring:
  application:
    name: smart-farm

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfarm_dev}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:dev123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MQTT
mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  client-id: smartfarm-server
  username: ""
  password: ""
  default-qos: 1

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-at-least-256-bits-long!!}
  access-token-expiry: 7200      # 2小时
  refresh-token-expiry: 604800   # 7天

# 业务配置
smartfarm:
  tenant-id: t001
  command:
    timeout-seconds: 30
    max-retry: 3
    max-duration-minutes: 60

# WeChat
wechat:
  app-id: ""
  app-secret: ""
  template-id:
    alert: ""
  enabled: false

# AI 智能体配置
ai:
  # 主模型（通义千问）
  llm:
    api-url: ${AI_LLM_API_URL:https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions}
    api-key: ${AI_LLM_API_KEY:}
    model: ${AI_LLM_MODEL:qwen-plus}
    temperature: 0.7
    max-tokens: 1024
    timeout-seconds: 30
  # 降级备选模型（DeepSeek）
  fallback:
    enabled: ${AI_FALLBACK_ENABLED:false}
    api-url: ${AI_FALLBACK_API_URL:https://api.deepseek.com/v1/chat/completions}
    api-key: ${AI_FALLBACK_API_KEY:}
    model: ${AI_FALLBACK_MODEL:deepseek-chat}
  # 巡检 Agent 配置
  patrol:
    trend-check-interval-ms: 1800000    # 30分钟
    device-health-interval-ms: 7200000  # 2小时
    daily-summary-cron: "0 0 20 * * ?"  # 每日20:00
  # 优化引擎配置
  optimization:
    schedule-cron: "0 0 3 ? * MON"      # 每周一凌晨3点
    min-data-days: 14                    # 最少数据天数
    analysis-window-days: 30             # 分析窗口天数
  # 安全限制
  security:
    max-input-length: 500               # 最大输入字符数
    rate-limit-per-minute: 10           # 每用户每分钟最大对话次数
    dangerous-ops-confirm: true         # 危险操作需二次确认

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
