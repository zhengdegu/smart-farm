server:
  port: 8080

spring:
  application:
    name: smart-farm

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartfarm_dev}
    username: ${SPRING_DATASOURCE_USERNAME:dev}
    password: ${SPRING_DATASOURCE_PASSWORD:dev123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# MQTT
mqtt:
  broker: ${MQTT_BROKER:tcp://localhost:1883}
  client-id: smartfarm-server
  username: ""
  password: ""
  default-qos: 1

# JWT
jwt:
  secret: ${JWT_SECRET:dev-secret-key-change-in-production-at-least-256-bits-long!!}
  access-token-expiry: 7200      # 2小时
  refresh-token-expiry: 604800   # 7天

# 业务配置
smartfarm:
  tenant-id: t001
  command:
    timeout-seconds: 30
    max-retry: 3
    max-duration-minutes: 60

# WeChat
wechat:
  app-id: ""
  app-secret: ""
  template-id:
    alert: ""
  enabled: false

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
